<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>網頁佈局練習</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0; /* 背景淺灰色 */
            padding: 50px;
        }

        /* 表格樣式 */
        table {
            border-collapse: collapse; /* 合併邊框 */
            width: 300px;
            background-color: white;
            border: 1px solid black;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
            font-size: 18px;
        }

        /* 表頭樣式：深灰色背景、白色文字 */
        th {
            background-color: #666666;
            color: white;
        }

        /* 奇數行背景顏色為黃色 (1, 3, 5...) */
        tr:nth-child(odd) td {
            background-color: yellow;
        }

        /* 偶數行背景顏色為白色 (2, 4...) */
        tr:nth-child(even) td {
            background-color: white;
        }

        /* 固定定位的 Div 樣式 */
        .fixed-box {
            position: fixed; /* 固定定位 */
            top: 20px;       /* 距離頂部 20px */
            right: 20px;     /* 距離右側 20px */
            width: 150px;
            height: 150px;
            border: 3px solid #6b8e23; /* 橄欖綠邊框 */
            background-color: white;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box; /* 確保 padding 不會撐大寬度 */
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Firstname</th>
                <th>Lastname</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>2</td>
                <td>2</td>
            </tr>
            <tr>
                <td>3</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>

    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
