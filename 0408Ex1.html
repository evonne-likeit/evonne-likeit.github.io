<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 50px;
        }

        table {
            border-collapse: collapse; 
            width: 300px;
            background-color: white;
            border: 1px solid black;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: left;
            font-size: 18px;
        }
        
        th {
            background-color: #666666;
            color: white;
        }

        tr:nth-child(odd) td {
            background-color: yellow;
        }

        tr:nth-child(even) td {
            background-color: white;
        }

        .fixed-box {
            position: fixed; 
            top: 20px;       
            right: 20px;     
            width: 150px;
            height: 150px;
            border: 3px solid #6b8e23;
            background-color: white;
            padding: 10px;
            font-size: 16px;
            box-sizing: border-box; 
        }
    </style>
</head>
<body>

    <table>
        <thead>
            <tr>
                <th>Firstname</th>
                <th>Lastname</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>1</td>
            </tr>
            <tr>
                <td>2</td>
                <td>2</td>
            </tr>
            <tr>
                <td>3</td>
                <td>3</td>
            </tr>
        </tbody>
    </table>

    <div class="fixed-box">
        This div element has position: fixed;
    </div>

</body>
</html>
