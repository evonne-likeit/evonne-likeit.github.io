<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: serif;
      padding: 20px;
    }

    .outer-box {
    border: none;
    box-shadow: 0 4px 15px rgba(0,0,0,0.6); 
    padding: 20px;
    background-color: #fff; 
}

    .h1-style {
      display: inline-block;
      font-size: 3em;
      margin: 0;
      border-top: 4px solid black;
      text-shadow: 6px 6px 0px pink;
    }

    .h2-style {
      font-style: italic;
      font-size: 2em;
      margin-top: 30px;
      padding: 0px;
      border: 1.5px solid black;
      outline-style: solid;
      outline-color: yellow;
      width: 95%;
      box-shadow: 0 3px 10px rgba(0,0,0,0.6);
    }

    .h3-style {
      text-align: right;
      font-size: 1.5em;
      margin-top: 30px;
    }

    .h3-style span {
      border-bottom: 4px solid black; 
      padding-bottom: 0px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="outer-box">
    <h1 class="h1-style">This is heading 1</h1>
    <h2 class="h2-style">This is heading 2</h2>
    <div class="h3-style">
      <span>This is heading 3</span>
    </div>
  </div>
</body>
</html>
