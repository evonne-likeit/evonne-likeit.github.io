<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: serif;
      padding: 20px;
    }

    .h1-style {
      display: inline-block;
      font-size: 3em;
      margin: 0;
      border-top: 4px solid black;
      text-shadow: 2px 2px 0px pink;
    }

    .h2-style {
      font-style: italic;
      font-size: 2em;
      margin-top: 30px;
      padding: 5px;
      border: 1px solid black;
      outline: 3px solid yellow;
      width: 95%;
    }

    .h3-style {
      text-align: right;
      font-size: 1.5em;
      margin-top: 30px;
    }

    .h3-style span {
      border-bottom: 4px double black;
      padding-bottom: 2px;
    }
  </style>
</head>
<body>
  <h1 class="h1-style">This is heading 1</h1>
  <h2 class="h2-style">This is heading 2</h2>
  <div class="h3-style">
    <span>This is heading 3</span>
  </div>
</body>
</html>
